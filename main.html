<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

    min-height: 100vh;

    color: #e0e4ec;

  }
  .header { text-align: center; margin-bottom: 32px; }
  .header h1 {
    font-size: 32px; font-weight: 800;
    background: linear-gradient(135deg, #f0c040, #e07020, #d04040);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: 2px; text-transform: uppercase;
  }
  .header p { font-size: 14px; color: #8090a8; margin-top: 4px; letter-spacing: 3px; text-transform: uppercase; }
  .container { max-width: 700px; margin: 0 auto; }
  .sect-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .sect-label { font-size: 13px; color: #8090a8; text-transform: uppercase; letter-spacing: 1px; }
  .sect-counter { font-size: 24px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .sect-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(88px, 1fr)); gap: 8px; margin-bottom: 16px; }
  .sect-btn {
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
    padding: 10px 4px; border-radius: 10px; border: 2px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.03); color: #8090a8; cursor: pointer;
    transition: all 0.2s ease; font-size: 12px; font-weight: 500; outline: none;
  }
  .sect-btn:hover:not(.disabled) { background: rgba(255,255,255,0.06); }
  .sect-btn .emoji { font-size: 22px; }
  .sect-btn.disabled { opacity: 0.35; cursor: not-allowed; color: #444; }
  .clear-btn {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
    color: #8090a8; padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 12px;
  }
  .clear-btn:hover { background: rgba(255,255,255,0.1); }
  .missing-bar { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; justify-content: center; margin-bottom: 8px; }
  .missing-label { font-size: 11px; color: #556; text-transform: uppercase; letter-spacing: 1px; }
  .missing-pill {
    font-size: 11px; color: #665544; background: rgba(255,255,255,0.04);
    padding: 2px 8px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.06);
  }
  .notes { display: flex; flex-direction: column; gap: 4px; margin: 12px 0 24px; }
  .note {
    font-size: 12px; padding: 6px 12px; border-radius: 6px;
  }
  .note.good { background: rgba(68,220,100,0.08); border: 1px solid rgba(68,220,100,0.15); color: #66dd88; }
  .note.warn { background: rgba(255,180,60,0.08); border: 1px solid rgba(255,180,60,0.12); color: #ddaa44; }
  .results-title {
    font-size: 16px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px;
    color: #f0c040; margin-bottom: 16px; text-align: center;
  }
  .hero-card {
    background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px; padding: 16px; position: relative; margin-bottom: 12px;
  }
  .hero-card.top {
    background: linear-gradient(135deg, rgba(240,192,64,0.08), rgba(208,64,64,0.06));
    border: 1px solid rgba(240,192,64,0.25);
  }
  .rank-badge {
    position: absolute; top: -1px; left: -1px; width: 28px; height: 28px;
    border-radius: 12px 0 8px 0; display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 14px;
  }
  .hero-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; padding-left: 32px; }
  .hero-name { font-size: 18px; font-weight: 700; }
  .hero-alias { font-size: 12px; color: #556; margin-left: 8px; }
  .power-badge { font-size: 16px; font-weight: 800; padding: 2px 10px; border-radius: 6px; }
  .build-info { display: flex; flex-direction: column; gap: 6px; padding-left: 32px; }
  .build-label { font-size: 14px; font-weight: 600; color: #aabbcc; }
  .sect-pills { display: flex; flex-wrap: wrap; gap: 4px; }
  .sect-pill { font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 600; }
  .meta-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 2px; }
  .meta-pill { font-size: 11px; padding: 2px 8px; border-radius: 4px; }
  .icon-info { font-size: 11px; color: #556; }
  .poison-warn {
    font-size: 11px; color: #cc6644; background: rgba(204,102,68,0.08);
    padding: 3px 8px; border-radius: 4px; border: 1px solid rgba(204,102,68,0.15); margin-top: 2px;
  }
  .footer { text-align: center; margin-top: 40px; font-size: 11px; color: #334; letter-spacing: 1px; }
  .empty { text-align: center; color: #556; }

// ============================================================
// SCORING
// ============================================================
function scoreHero(hero, pool) {
  const p = new Set(pool);
  if (hero.icons.length > 0 && !hero.icons.every(i => p.has(i))) return null;

  const scored = hero.builds.map(b => {
    let s = ((b.power[0] + b.power[1]) / 2) * 20;
    if (b.main1 && p.has(b.main1)) s += 15; else if (b.main1) s -= 25;
    if (b.main2 && p.has(b.main2)) s += 12; else if (b.main2) s -= 15;
    const ap = b.additional.filter(x => p.has(x)).length, at = b.additional.length;
    if (at > 0) s += (ap / at) * 8;
    if (!p.has("crit")) {
      if (b.critImportance === 1) s -= 35;
      else if (b.critImportance === 2) s -= 25;
      else if (b.critImportance === 3) s -= 12;
      else if (b.critImportance === 4) s -= 5;
    } else {
      if (b.critImportance === 1) s += 8;
      else if (b.critImportance === 2) s += 5;
    }
    if (p.has("frost") && p.has("fury") && ["frost","fury"].some(x => b.main1===x || b.main2===x)) s += 8;
    if (p.has("shield") && !p.has("injury") && (b.main1==="shield" || b.main2==="shield")) s += 6;
    if (p.has("injury") && !p.has("shield") && (b.main1==="injury" || hero.icons.includes("injury"))) s += 4;
    if (p.has("poison") && hero.poisonWeak) s -= 8;
    if (p.has("chaos") && hero.poisonWeak) s -= 3;
    if (hero.specialPower) {
      const m = hero.specialPower.sects.filter(x => p.has(x)).length;
      if (m >= hero.specialPower.sects.length) {
        const sp = ((hero.specialPower.power[0] + hero.specialPower.power[1]) / 2) * 20 + 15;
        s = Math.max(s, sp);
      }
    }
    return { ...b, score: s };
  });
  const best = scored.reduce((a, b) => a.score > b.score ? a : b);
  return { hero, bestBuild: best, score: best.score };
}

const selected = new Set();
const app = document.getElementById("app");

function critLabel(l) {
  return {1:"Critical + Manablast",2:"Important",3:"Manablast only",4:"May need Manablast",5:"Not important",6:"No need"}[l]||"";
}
function critColor(l) {
  return {1:"#ff4444",2:"#ff8800",3:"#ffcc00",4:"#88cc44",5:"#44aa88",6:"#448844"}[l]||"#888";
}
function powerColor(p) {
  const a=(p[0]+p[1])/2; return a>=5?"#ff4444":a>=4?"#ff8800":a>=3?"#ffcc00":"#888";
}
function shardColors(s) {
  return {musthave:{bg:"#ff4444"},good:{bg:"#44aa44"},situational:{bg:"#cc8800"},"buy late":{bg:"#5588cc"},"no need":{bg:"#555"}}[s]||{bg:"#555"};
}

function render() {
  const count = selected.size;
  const sectsArr = Array.from(selected);
  const missing = SECTS.filter(s => !selected.has(s.id));

  // Pool notes
  const notes = [];
  if (count === 8) {
    if (!selected.has("crit")) notes.push({icon:"💥",text:"No Crit — physical damage builds weakened",type:"warn"});
    if (!selected.has("attack")) notes.push({icon:"⚔️",text:"No Attack — primary damage sect missing",type:"warn"});
    if (!selected.has("regen")) notes.push({icon:"🩹",text:"No Regen — #1 survival sect unavailable",type:"warn"});
    if (!selected.has("health")) notes.push({icon:"❤️",text:"No Health — #2 survival sect unavailable",type:"warn"});
    if (!selected.has("ult")) notes.push({icon:"🔮",text:"No Ult — mage damage limited",type:"warn"});
    if (selected.has("shield") && !selected.has("injury")) notes.push({icon:"🛡️",text:"Shield UNCHECKED — shield stackers are very strong",type:"good"});
    if (selected.has("injury") && !selected.has("shield")) notes.push({icon:"🩸",text:"Vulnerability UNCHECKED — fast burst games",type:"good"});
    if (selected.has("frost") && selected.has("fury")) notes.push({icon:"⚡",text:"Frost+Fury SYNERGY — both +50% effectiveness",type:"good"});
    if (selected.has("poison") && selected.has("evasion")) notes.push({icon:"⚠️",text:"Poison counters Evasion — evade heroes weakened",type:"warn"});
    if (selected.has("chaos") && selected.has("evasion")) notes.push({icon:"⚠️",text:"Chaos counters Evasion — chaos dmg can't be evaded",type:"warn"});
  }

  // Recommendations
  let recs = [];
  if (count === 8) {
    recs = HEROES.map(h => scoreHero(h, sectsArr)).filter(Boolean).sort((a,b) => b.score - a.score).slice(0, 5);
  }

  let html = '';

  // Sect bar
  html += `<div class="sect-bar">
    <span class="sect-label">Select 8 Sects in your pool</span>
    <div style="display:flex;align-items:center;gap:12px">
      <span class="sect-counter" style="color:${count===8?'#44dd66':'#f0c040'}">${count}/8</span>
      ${count > 0 ? '<button class="clear-btn" onclick="clearAll()">Clear</button>' : ''}
    </div>
  </div>`;

  // Sect grid
  html += '<div class="sect-grid">';
  for (const sect of SECTS) {
    const isSel = selected.has(sect.id);
    const isDis = !isSel && count >= 8;
    html += `<button class="sect-btn${isDis?' disabled':''}"
      onclick="${isDis?'':'toggleSect(\''+sect.id+'\')'}"
      style="${isSel ? `border-color:${sect.color};background:linear-gradient(135deg,${sect.color}22,${sect.color}11);color:${sect.color};font-weight:700;box-shadow:0 0 20px ${sect.color}22,inset 0 0 15px ${sect.color}11` : ''}">
      <span class="emoji">${sect.emoji}</span>
      <span>${sect.name}</span>
    </button>`;
  }
  html += '</div>';

  // Missing
  if (count === 8) {
    html += '<div class="missing-bar"><span class="missing-label">Missing:</span>';
    for (const s of missing) html += `<span class="missing-pill">${s.emoji} ${s.name}</span>`;
    html += '</div>';
  }

  // Notes
  if (notes.length) {
    html += '<div class="notes">';
    for (const n of notes) html += `<div class="note ${n.type}">${n.icon} ${n.text}</div>`;
    html += '</div>';
  }

  // Results
  if (count === 8) {
    html += '<h2 class="results-title">Top 5 Recommendations</h2>';
    if (!recs.length) {
      html += '<p class="empty">No heroes available in this pool combination.</p>';
    } else {
      for (let i = 0; i < recs.length; i++) {
        const r = recs[i], b = r.bestBuild, rank = i + 1;
        const pc = powerColor(b.power);
        const sc = shardColors(b.shard);
        const cc = critColor(b.critImportance);

        html += `<div class="hero-card${rank===1?' top':''}">`;
        html += `<div class="rank-badge" style="background:${rank===1?'linear-gradient(135deg,#f0c040,#d04040)':rank<=3?'rgba(255,255,255,0.1)':'rgba(255,255,255,0.05)'};color:${rank===1?'#000':'#8090a8'}">${rank}</div>`;

        // Header
        html += `<div class="hero-header"><div>
          <span class="hero-name" style="color:${rank===1?'#f0c040':'#e0e4ec'}">${r.hero.name}</span>
          ${r.hero.alias?`<span class="hero-alias">(${r.hero.alias})</span>`:''}
        </div>
        <div class="power-badge" style="color:${pc};background:${pc}15;border:1px solid ${pc}33">
          ${b.power[0]===b.power[1]?b.power[0]:b.power[0]+'-'+b.power[1]}
        </div></div>`;

        // Build info
        html += '<div class="build-info">';
        html += `<div class="build-label">${b.label}</div>`;

        // Sect pills
        html += '<div class="sect-pills">';
        const allSects = [b.main1, b.main2, ...b.additional].filter(Boolean);
        for (const sid of allSects) {
          const sect = SECTS.find(s => s.id === sid);
          const inPool = selected.has(sid);
          html += `<span class="sect-pill" style="background:${inPool?sect.color+'22':'rgba(255,50,50,0.1)'};color:${inPool?sect.color:'#aa4444'};border:1px solid ${inPool?sect.color+'44':'#aa444433'}">${sect.emoji} ${sect.name} ${inPool?'✓':'✗'}</span>`;
        }
        html += '</div>';

        // Meta row
        html += '<div class="meta-row">';
        html += `<span class="meta-pill" style="background:${cc}18;color:${cc};border:1px solid ${cc}33">Crit: ${critLabel(b.critImportance)}</span>`;
        html += `<span class="meta-pill" style="background:${sc.bg}33;color:${sc.bg};border:1px solid ${sc.bg}44">Shard: ${b.shard}</span>`;
        html += `<span class="icon-info">Icons: ${r.hero.icons.length===0?'Always available':r.hero.icons.map(id=>{const s=SECTS.find(x=>x.id===id);return s?s.emoji:id}).join(' ')}</span>`;
        html += '</div>';

        // Poison warning
        if (r.hero.poisonWeak && selected.has("poison")) {
          html += '<div class="poison-warn">⚠️ Weakened by Poison in pool — evasion bypassed</div>';
        }

        html += '</div></div>'; // build-info, hero-card
      }
    }
  }

  html += '<div class="footer">Data: Gladiators Guide ENG (17.02.2026) + Game Files (V9.22)</div>';
  app.innerHTML = html;
}

function toggleSect(id) {
  if (selected.has(id)) selected.delete(id);
  else if (selected.size < 8) selected.add(id);
  render();
}

function clearAll() {
  selected.clear();
  render();
}

// Initial render
render();
</script>
</body>
</html>
